# Server settings
server:
  port: 8091

spring:
  # H2 in-memory database datasource
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 

  # H2 console settings
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        # Allow access from other hosts (optional; consider restricting in non-local environments)
        web-allow-others: true

  # JPA/Hibernate settings
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update   # create, create-drop, validate, update (choose per environment)
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  # SQL initialization (optional: loads schema.sql/data.sql when present)
  sql:
    init:
      mode: always
      encoding: UTF-8

# Logging for SQL (Hibernate 6 categories)
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
